name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    # The date-clock bug class is invisible in the machine's own zone. Running
    # only UTC (the old default) is exactly where it hides. NY is where
    # getUTCHours() != getHours(); Kolkata's half-hour offset breaks the mock
    # pair that used to lie. A green run in one zone proves nothing.
    strategy:
      fail-fast: false
      matrix:
        tz: [UTC, America/New_York, Asia/Kolkata]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '25'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm run test:run
      env:
        TZ: ${{ matrix.tz }}

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        # Matches production (Node 25 / npm 11). package.json still declares
        # engines <=22.x, but prod runs 25; Node 22 ships npm 10, which rejects
        # the npm 11 lockfile over vite's optional `yaml` peer dep.
        node-version: '25'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      run: npm ci

    # Guards the tenant-isolation middleware. Breaking these means user A can
    # read or mutate user B's data — see backend/src/ownership/.
    - name: Run tests
      run: npm run test:run

