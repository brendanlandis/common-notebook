name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '25'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm run test:run

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        # Matches production (Node 25 / npm 11). package.json still declares
        # engines <=22.x, but prod runs 25; Node 22 ships npm 10, which rejects
        # the npm 11 lockfile over vite's optional `yaml` peer dep.
        node-version: '25'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      run: npm ci

    # Guards the tenant-isolation middleware. Breaking these means user A can
    # read or mutate user B's data — see backend/src/ownership/.
    - name: Run tests
      run: npm run test:run

